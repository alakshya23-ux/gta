<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NYC Evening - Working</title>
<style>body{margin:0;overflow:hidden;background:#000}canvas{display:block}#info{position:fixed;top:10px;left:10px;color:#fff;font-family:Arial;background:rgba(0,0,0,.6);padding:8px 12px;border-radius:8px}</style>
</head>
<body>
<div id="info">WASD drive • Click to start • Evening NYC</div>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1424);
scene.fog = new THREE.Fog(0x0d1424, 50, 300);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,5,15);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// LIGHTS - evening
const sun = new THREE.DirectionalLight(0xff9966, 0.8);
sun.position.set(-30,20,-20);
sun.castShadow = true;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x404060, 0.6));

// GROUND - wet road
const road = new THREE.Mesh(
  new THREE.PlaneGeometry(400,400),
  new THREE.MeshStandardMaterial({color:0x141a26, roughness:0.4, metalness:0.6})
);
road.rotation.x = -Math.PI/2;
road.receiveShadow = true;
scene.add(road);

// STREET LAMPS - 16 lights you can actually see
for(let i=0;i<16;i++){
  const x = (i%4-1.5)*50;
  const z = (Math.floor(i/4)-1.5)*50;
  const light = new THREE.PointLight(0xffb86b, 1.5, 80);
  light.position.set(x,8,z);
  light.castShadow = true;
  scene.add(light);
  // pole
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,8), new THREE.MeshStandardMaterial({color:0x333}));
  pole.position.set(x,4,z);
  scene.add(pole);
  // glow bulb
  const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshBasicMaterial({color:0xffddaa}));
  bulb.position.copy(light.position);
  scene.add(bulb);
}

// BUILDINGS - simple towers
for(let i=0;i<30;i++){
  const h = 20 + Math.random()*60;
  const b = new THREE.Mesh(
    new THREE.BoxGeometry(12, h, 12),
    new THREE.MeshStandardMaterial({color:0x1a2233, roughness:0.8})
  );
  b.position.set((Math.random()-0.5)*300, h/2, (Math.random()-0.5)*300);
  b.castShadow = true;
  scene.add(b);
  // windows glow
  for(let w=0; w<5; w++){
    const win = new THREE.Mesh(new THREE.PlaneGeometry(8,2), new THREE.MeshBasicMaterial({color:0xffcc66, transparent:true, opacity:0.3}));
    win.position.set(b.position.x, 5+w*8, b.position.z+6.01);
    scene.add(win);
  }
}

// CARS - 5 real-looking cars (boxes with details)
const cars = [];
const colors = [0xcc0000,0xffffff,0x0a2a5a,0xffd700,0x111111];
for(let i=0;i<5;i++){
  const car = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(2.2,0.9,4.5), new THREE.MeshStandardMaterial({color:colors[i], metalness:0.7, roughness:0.3}));
  body.position.y = 0.7;
  body.castShadow = true;
  car.add(body);
  // windshield
  const glass = new THREE.Mesh(new THREE.BoxGeometry(1.9,0.5,1.8), new THREE.MeshStandardMaterial({color:0x112233, transparent:true, opacity:0.6}));
  glass.position.set(0,1.2,0.2);
  car.add(glass);
  // headlights
  const hl1 = new THREE.Mesh(new THREE.CircleGeometry(0.15), new THREE.MeshBasicMaterial({color:0xffffee}));
  hl1.position.set(-0.7,0.6,2.26); hl1.rotation.y=Math.PI;
  const hl2 = hl1.clone(); hl2.position.x=0.7;
  car.add(hl1, hl2);
  car.position.set((i-2)*15,0,20);
  scene.add(car);
  cars.push({mesh:car, speed:0});
}
let player = cars[0];

// CONTROLS
const keys = {};
window.addEventListener('keydown', e=>keys[e.key.toLowerCase()]=true);
window.addEventListener('keyup', e=>keys[e.key.toLowerCase()]=false);
window.addEventListener('click', ()=>renderer.domElement.requestPointerLock());

// ANIMATE
function animate(){
  requestAnimationFrame(animate);

  // drive
  if(keys['w']) player.speed = Math.min(player.speed+0.015, 0.7);
  if(keys['s']) player.speed = Math.max(player.speed-0.02, -0.3);
  player.speed *= 0.96;
  if(keys['a']) player.mesh.rotation.y += 0.025;
  if(keys['d']) player.mesh.rotation.y -= 0.025;
  player.mesh.translateZ(player.speed);

  // water splash effect
  if(Math.abs(player.speed)>0.3 && Math.random()<0.3){
    const splash = new THREE.Mesh(new THREE.SphereGeometry(0.05), new THREE.MeshBasicMaterial({color:0x88aaff, transparent:true, opacity:0.7}));
    splash.position.copy(player.mesh.position);
    splash.position.y = 0.1;
    scene.add(splash);
    setTimeout(()=>scene.remove(splash), 300);
  }

  // camera follow
  const behind = new THREE.Vector3(0,4,-12).applyQuaternion(player.mesh.quaternion).add(player.mesh.position);
  camera.position.lerp(behind, 0.07);
  camera.lookAt(player.mesh.position);

  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
