<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({antialias:true}); renderer.setSize(innerWidth,innerHeight); renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.1; document.body.appendChild(renderer.domElement);

// 1. REAL NIGHT HDRI
new RGBELoader().load('https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/urban_night_01_1k.hdr', hdr=>{
  hdr.mapping = THREE.EquirectangularReflectionMapping;
  scene.environment = hdr; scene.background = new THREE.Color(0x02040a);
});

// 2. WET ROAD with real texture
const roadTex = new THREE.TextureLoader().load('https://threejs.org/examples/textures/terrain/asphalt.jpg');
roadTex.wrapS=roadTex.wrapT=THREE.RepeatWrapping; roadTex.repeat.set(20,20);
const road = new THREE.Mesh(new THREE.PlaneGeometry(2000,2000), new THREE.MeshPhysicalMaterial({map:roadTex, roughness:0.2, metalness:0.8, clearcoat:1, clearcoatRoughness:0.05, color:0x0a0a0f}));
road.rotation.x=-Math.PI/2; scene.add(road);

// 3. STREET LAMPS with glow
for(let i=0;i<40;i++){
  const x=(i%8-4)*120, z=Math.floor(i/8-2)*120;
  const light = new THREE.PointLight(0xffcc99, 800, 120, 2); light.position.set(x,9,z); light.castShadow=true; scene.add(light);
  const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshBasicMaterial({color:0xffddaa})); bulb.position.copy(light.position); scene.add(bulb);
}

// 4. LOAD REAL CARS
const loader = new GLTFLoader();
let playerCar;
loader.load('https://threejs.org/examples/models/gltf/ferrari.glb', gltf=>{
  playerCar = gltf.scene; playerCar.scale.set(1.8,1.8); playerCar.position.set(0,0,0); scene.add(playerCar);
  // add headlights
  const hl = new THREE.SpotLight(0xffffff, 10, 80, 0.4, 0.2); hl.position.set(0,0.8,2); playerCar.add(hl); playerCar.add(hl.target); hl.target.position.set(0,0,20);
});

// 5. BUILDINGS - use boxes but with real concrete texture
const bTex = new THREE.TextureLoader().load('https://threejs.org/examples/textures/brick_diffuse.jpg');
for(let i=0;i<60;i++){ const h=60+Math.random()*120; const m=new THREE.MeshStandardMaterial({map:bTex, roughness:0.9}); const b=new THREE.Mesh(new THREE.BoxGeometry(30, h, 30), m); b.position.set((Math.random()-0.5)*900, h/2, (Math.random()-0.5)*900); scene.add(b);}

// 6. BLOOM + RAIN
const composer = new EffectComposer(renderer); composer.addPass(new RenderPass(scene,camera)); composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),1.3,0.5,0.15));

// animate
function tick(){ requestAnimationFrame(tick); if(playerCar) playerCar.rotation.y+=0.002; composer.render(); } tick();
</script>
